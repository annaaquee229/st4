<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Floating Window UI</title>
    <style>
        /* 1. 배경 설정 (이미지의 실외 배경 느낌) */
        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: url('https://images.unsplash.com/photo-1506744038136-46273834b3fb?q=80&w=2070&auto=format&fit=crop') no-repeat center center;
            background-size: cover;
            font-family: 'Arial', sans-serif;
        }

        /* 2. 윈도우 창 스타일 (애플/OS 레이어 느낌) */
        .window-container {
            width: 85%;
            max-width: 1000px;
            height: 700px;
            background-color: #e5e0d8; /* 이미지의 베이지 톤 */
            border: 1px solid #999;
            border-radius: 4px; /* 살짝 각진 느낌 유지 */
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.3); /* 공중에 뜬 효과 */
            overflow: hidden;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        /* 3. 상단 내비게이션 바 */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 20px;
            height: 60px;
            border-bottom: 1px solid #b5b5b5;
            background-color: #e5e0d8;
        }

        .logo { font-weight: bold; font-size: 1.2rem; letter-spacing: 1px; }
        
        nav ul { list-style: none; display: flex; gap: 20px; margin: 0; padding: 0; font-size: 0.8rem; }
        nav ul li { cursor: pointer; text-transform: uppercase; }

        /* 4. 메인 컨텐츠 영역 */
        .content {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 40px;
            position: relative;
        }

        .product-image {
            width: 60%;
            max-width: 500px;
            transition: transform 0.3s;
        }

        .product-image:hover { transform: scale(1.02); }

        .title-overlay {
            position: absolute;
            bottom: 40px;
            left: 40px;
            text-align: left;
        }

        .category { font-size: 0.7rem; color: #666; margin-bottom: 5px; }
        .product-name {
            font-size: 5rem;
            font-weight: 500;
            margin: 0;
            color: #333;
            letter-spacing: -2px;
        }

        /* 5. 하단 썸네일 영역 */
        .thumbnails {
            position: absolute;
            bottom: 40px;
            right: 40px;
            display: flex;
            gap: 10px;
        }

        .thumb {
            width: 60px;
            height: 45px;
            background: #ccc;
            border: 1px solid #aaa;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="window-container">
        <header>
            <div class="logo">OAKAME</div>
            <nav>
                <ul>
                    <li>Products</li>
                    <li>Lookbook</li>
                    <li>Pro</li>
                    <li>Sign In</li>
                    <li>Cart (0)</li>
                    <li>EN</li>
                </ul>
            </nav>
        </header>

        <main class="content">
            <img src="https://images.unsplash.com/photo-1555041469-a586c61ea9bc?q=80&w=2070&auto=format&fit=crop" alt="Sofa" class="product-image">
            
            <div class="title-overlay">
                <div class="category">SOFAS</div>
                <h1 class="product-name">BONAPARTE</h1>
            </div>

            <div class="thumbnails">
                <div class="thumb"></div>
                <div class="thumb"></div>
                <div class="thumb"></div>
            </div>
        </main>
    </div>

</body>
</html>
